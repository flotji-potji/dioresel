executor: slurm
default-resources:
  mem_mb: 2000
  cpus_per_task: 1
  runtime: 1h
  partition: basic,short
jobs: 20

max-jobs-per-second: 20
restart-times: 0
printshellcmds: True
jobname: 'smk_{rule}-{jobid}'  
slurm-logdir: logs/smk/

latency-wait: 60
#default-storage-provider: fs
use-conda: True

set-resources:
  - pcadapt_scan_and_plot:mem_mb=4000
  - pcadapt_ldthin_scan_and_plot:mem_mb=4000